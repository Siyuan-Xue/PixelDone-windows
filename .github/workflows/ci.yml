name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1
          components: rustfmt, clippy
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: bun install --frozen-lockfile
      - name: Export required cloud build configuration
        shell: pwsh
        env:
          PIXELDONE_SUPABASE_URL: ${{ secrets.PIXELDONE_SUPABASE_URL }}
          PIXELDONE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.PIXELDONE_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          if (-not $env:PIXELDONE_SUPABASE_URL) { throw 'Missing PIXELDONE_SUPABASE_URL' }
          if (-not $env:PIXELDONE_SUPABASE_PUBLISHABLE_KEY) { throw 'Missing PIXELDONE_SUPABASE_PUBLISHABLE_KEY' }
          "PIXELDONE_SUPABASE_URL=$env:PIXELDONE_SUPABASE_URL" >> $env:GITHUB_ENV
          "PIXELDONE_SUPABASE_PUBLISHABLE_KEY=$env:PIXELDONE_SUPABASE_PUBLISHABLE_KEY" >> $env:GITHUB_ENV
          "PIXELDONE_REQUIRE_CLOUD_CONFIG=true" >> $env:GITHUB_ENV
          "PIXELDONE_ALLOW_INSECURE_HTTP=true" >> $env:GITHUB_ENV
      - run: bun run check
      - run: bun run test
      - run: bun run build
      - run: cargo fmt --check
        working-directory: src-tauri
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri
      - run: cargo test
        working-directory: src-tauri
      - run: bun run parity:check
