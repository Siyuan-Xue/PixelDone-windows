name: Release Windows x64

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  parity-gate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run parity:check
      - run: bun run test

  release:
    needs: parity-gate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: bun install --frozen-lockfile
      - name: Require signing material
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) { throw 'Missing Tauri updater signing key' }
      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          PIXELDONE_SUPABASE_URL: ${{ secrets.PIXELDONE_SUPABASE_URL }}
          PIXELDONE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.PIXELDONE_SUPABASE_PUBLISHABLE_KEY }}
          PIXELDONE_REQUIRE_CLOUD_CONFIG: true
          PIXELDONE_ALLOW_INSECURE_HTTP: true
        with:
          tagName: v__VERSION__
          releaseName: PixelDone v__VERSION__
          releaseDraft: false
          prerelease: false
          args: --bundles nsis --target x86_64-pc-windows-msvc
      - name: Finalize release metadata
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bun run release:manifest
          $directory = 'src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis'
          gh release edit $env:GITHUB_REF_NAME --notes-file RELEASE_NOTES.md
          gh release upload $env:GITHUB_REF_NAME "$directory/PixelDone_3.2.3_x64-setup.exe.sha256" "$directory/latest.json" --clobber
